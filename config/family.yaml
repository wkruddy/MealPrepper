  - id: adult_2
    name: Adult 2
    role: adult
    constraints:
      - variable_breakfast: true
      - simple_lunches: true
      - bulk_prep_lunch: true
    notes: "Off work ~5pm; shared dinners with toddler."

meal_blocks:
