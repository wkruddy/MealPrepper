llm:
  temperature: 0.4
  max_tokens: 4096

context:
  max_context_chars: 12000
  budgets:
    meal_finder: 8000
    recipe_expand: 4000
    recipe_import: 6000
    week_organizer: 6000
    grocery: 6000
    comms: 3000
    preference: 4000
  warn_at_pct: 0.85

index:
  meal_top_k: 5
  recipe_top_k: 6
  feedback_top_k: 8
  plan_top_k: 2
  use_embeddings: false

planning:
  week_starts_on: monday
  minimize_waste: true
  overlap_ingredients: true
  approval_required: true
  dish_lookback_weeks: 2    # exclude dishes served in the previous N weeks
  max_meal_repeat_days: 3   # same meal title at most 3 times per block per week
  cook_efficiency:
    enabled: true
    min_unique_per_block: 2       # fewer forced variety swaps (was 3)
    max_dinner_cook_sessions: 4   # target ~4 unique dinner cooks per week
    cross_block_reuse: true       # Monday dinner -> Tuesday lunch leftovers
    repeat_dinners: true          # reuse dinners across non-consecutive days
  ingredient_cohesion:
    enabled: true
    anchor_top_n: 10              # shared ingredients to prioritize across the week
    min_mentions: 2               # ingredient must appear in 2+ meals to become an anchor

storage:
  database: mealprepper.db

agents:
  weekly_meals:
    max_iterations: 3
  grocery:
    consolidate_duplicates: true
  communications:
    morning_summary: true
    collect_feedback: true
