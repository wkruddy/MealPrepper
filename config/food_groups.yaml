# Food group coverage for toddler and adult meals.
# Used to classify ingredients and note balanced plates.

required_groups:
  - carb
  - protein
  - veggie
  - fruit
  - fat

# toddler_* blocks require all groups (or suggest sides).
# adult_* blocks get notes but are not enforced.
# infant_blw and bulk_meal_prep are skipped.

